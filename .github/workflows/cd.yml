      #   run: |
      #     echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      #     docker tag equity-signal-api:latest ${{ secrets.DOCKER_USERNAME }}/equity-signal-api:latest
      #     docker push ${{ secrets.DOCKER_USERNAME }}/equity-signal-api:latest
